<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bidi Text</title>
  <style>
    body { margin: 0; padding: 0; background: #282c34; }
    #editor { width: 800px; height: 600px; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "codemirror": "https://esm.sh/*codemirror@6.0.1",
        "@codemirror/state": "https://esm.sh/*@codemirror/state@6.4.1",
        "@codemirror/view": "https://esm.sh/*@codemirror/view@6.34.1",
        "@codemirror/language": "https://esm.sh/*@codemirror/language@6.10.6",
        "@codemirror/commands": "https://esm.sh/*@codemirror/commands@6.7.1",
        "@codemirror/search": "https://esm.sh/*@codemirror/search@6.5.8",
        "@codemirror/autocomplete": "https://esm.sh/*@codemirror/autocomplete@6.18.4",
        "@codemirror/lint": "https://esm.sh/*@codemirror/lint@6.8.4",
        "@codemirror/lang-javascript": "https://esm.sh/*@codemirror/lang-javascript@6.2.2",
        "@codemirror/theme-one-dark": "https://esm.sh/*@codemirror/theme-one-dark@6.1.2",
        "@lezer/common": "https://esm.sh/*@lezer/common@1.2.3",
        "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.1",
        "@lezer/javascript": "https://esm.sh/*@lezer/javascript@1.4.21",
        "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.2",
        "crelt": "https://esm.sh/*crelt@1.0.6",
        "style-mod": "https://esm.sh/*style-mod@4.1.2",
        "w3c-keyname": "https://esm.sh/*w3c-keyname@2.2.8"
      }
    }
  </script>
</head>
<body>
  <div id="editor"></div>

  <script type="module">
    import { basicSetup, EditorView } from "codemirror";
    import { javascript } from "@codemirror/lang-javascript";
    import { oneDark } from "@codemirror/theme-one-dark";

    const doc = `// \u0645\u0631\u062D\u0628\u0627 \u0628\u0627\u0644\u0639\u0627\u0644\u0645 - Hello World in Arabic
// \u05E9\u05DC\u05D5\u05DD \u05E2\u05D5\u05DC\u05DD - Hello World in Hebrew

function greet(name) {
  // \u0627\u0644\u062A\u062D\u064A\u0629 \u0628\u0627\u0644\u0627\u0633\u0645
  const greeting = "\u0645\u0631\u062D\u0628\u0627\u060C " + name + "!";
  console.log(greeting);
}

const names = [
  "Alice",
  "\u0623\u062D\u0645\u062F",     // Ahmed
  "\u05D3\u05D5\u05D3",       // David
  "\u062E\u0627\u0644\u062F",     // Khaled
];

// \u062D\u0644\u0642\u0629 \u0644\u0637\u0628\u0627\u0639\u0629 \u0643\u0644 \u0627\u0644\u0623\u0633\u0645\u0627\u0621
for (const n of names) {
  greet(n); // \u0627\u0633\u062A\u062F\u0639\u0627\u0621 \u0627\u0644\u062F\u0627\u0644\u0629
}`;

    new EditorView({
      doc,
      extensions: [
        basicSetup,
        javascript(),
        oneDark,
      ],
      parent: document.getElementById("editor"),
    });
  </script>
</body>
</html>
