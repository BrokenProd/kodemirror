name: Deploy to Central

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/ci.yml
  deploy:
    needs: build
    strategy:
      matrix:
        include:
          # Ubuntu targets
          - target: publishJvmPublicationToSonatypeRepository
            os: ubuntu-latest
          - target: publishAndroidReleasePublicationToSonatypeRepository
            os: ubuntu-latest
          - target: publishWasmJsPublicationToSonatypeRepository
            os: ubuntu-latest
          - target: publishKotlinMultiplatformPublicationToSonatypeRepository
            os: ubuntu-latest
          # macOS targets (need macOS runner for native compilation)
          - target: publishIosArm64PublicationToSonatypeRepository
            os: macos-latest
          - target: publishIosSimulatorArm64PublicationToSonatypeRepository
            os: macos-latest
          - target: publishIosX64PublicationToSonatypeRepository
            os: macos-latest
          - target: publishMacosArm64PublicationToSonatypeRepository
            os: macos-latest
          - target: publishMacosX64PublicationToSonatypeRepository
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@v5
      with:
        gpg_private_key: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
        passphrase: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: gradle/actions/setup-gradle@v4
    - name: Gradle publish
      run: >-
        ./gradlew ${{ matrix.target }}
        closeSonatypeStagingRepository
        -Psigning.gnupg.passphrase='${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}'
        -Psigning.gnupg.keyName='${{ secrets.OSSRH_GPG_SECRET_KEY_ID }}'
        -PsonatypeUsername='${{ secrets.OSSRH_USERNAME }}'
        -PsonatypePassword='${{ secrets.OSSRH_PASSWORD }}'
